<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Help — SPO Production Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar (matches the real Atlas chrome) ── */
    .topbar {
      background: #1B2A3B;
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 48px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-logo { font-size: 18px; margin-right: 8px; }
    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .topbar-sep {
      color: rgba(255,255,255,0.25);
      margin: 0 8px;
      font-size: 13px;
    }
    .topbar-project {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .topbar-spacer { flex: 1; }
    .topbar-badge {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── PBI screenshot fills the rest of the viewport ── */
    .pbi-frame {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f0f2f5;
    }

    .pbi-screenshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top left;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* ── Subtle overlay so the ? button reads clearly ── */
    .pbi-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
    }

    /* ── Demo controls pill ── */
    .demo-controls {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(27, 42, 59, 0.92);
      backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 24px;
      padding: 7px 18px;
      font-size: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 9990;
      white-space: nowrap;
    }
    .demo-controls span { color: rgba(255,255,255,0.45); }
    .demo-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      border-radius: 14px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.1s;
    }
    .demo-btn:hover { background: rgba(255,255,255,0.2); }
    .demo-btn.active { background: #1B6CA8; border-color: #1B6CA8; }
  </style>
</head>
<body>

  <!-- App chrome -->
  <div class="topbar">
    <span class="topbar-logo">🗺️</span>
    <span class="topbar-title">Atlas</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-project">Turner SPO Production Monitor — North City Block F</span>
    <div class="topbar-spacer"></div>
    <span class="topbar-badge">Week ending Mar 30 2026</span>
  </div>

  <!-- Real PBI report screenshot as the embed backdrop -->
  <div class="pbi-frame">
    <img
      class="pbi-screenshot"
      src="./assets/pbi-overview.png"
      alt="SPO Production Monitor — Overview page"
      draggable="false"
    />
  </div>

  <!-- Demo controls -->
  <div class="demo-controls">
    <span>Try:</span>
    <button class="demo-btn active" id="btn-p1">Overview metrics</button>
    <button class="demo-btn" id="btn-all">All metrics</button>
    <button class="demo-btn" id="btn-dark">Dark mode</button>
    <button class="demo-btn active" id="btn-light" style="display:none">Light mode</button>
  </div>

  <!-- The web component -->
  <script type="module" src="../src/atlas-help.js"></script>
  <atlas-help id="help" page="p1"></atlas-help>

  <script>
    const help = document.getElementById('help');
    const btnDark = document.getElementById('btn-dark');
    const btnLight = document.getElementById('btn-light');
    const btnP1 = document.getElementById('btn-p1');
    const btnAll = document.getElementById('btn-all');

    btnDark.addEventListener('click', () => {
      help.setAttribute('theme', 'dark');
      btnDark.style.display = 'none';
      btnLight.style.display = '';
    });
    btnLight.addEventListener('click', () => {
      help.removeAttribute('theme');
      btnLight.style.display = 'none';
      btnDark.style.display = '';
    });
    btnP1.addEventListener('click', () => {
      help.setAttribute('page', 'p1');
      btnP1.classList.add('active');
      btnAll.classList.remove('active');
    });
    btnAll.addEventListener('click', () => {
      help.setAttribute('page', 'all');
      btnAll.classList.add('active');
      btnP1.classList.remove('active');
    });
  </script>

</body>
</html>
